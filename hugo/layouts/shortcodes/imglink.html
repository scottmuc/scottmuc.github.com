{{- $image := .Page.Resources.GetMatch (.Get "src") -}}
{{- $href := .Get "href" -}}
{{- $width := "100x" -}}
{{- if (.Get "width") -}}
		{{- $width = (.Get "width") -}}
{{- end -}}
{{- $smallImage := $image.Resize $width -}}
<figure>
  <a href="{{ $href }}" class="imglink">
    <img src="{{ $smallImage.Permalink }}" width="{{ $smallImage.Width }}" />
  </a>
{{- if (.Get "caption") -}}
  {{- $caption := (.Get "caption") -}}
  <figcaption>{{ $caption }}</figcaption>
{{- end -}}
</figure>
